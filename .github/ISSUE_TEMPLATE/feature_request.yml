name: Feature request
description: Suggest an improvement
title: "Feature: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem or goal
      description: What should the app help with?
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Suggested solution
      description: Describe the change you would like.
    validations:
      required: true
  - type: textarea
    id: notes
    attributes:
      label: Notes
      description: Add sketches, examples, or alternatives.
