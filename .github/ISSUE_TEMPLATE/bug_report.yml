name: Bug report
description: Report something that is broken
title: "Bug: "
labels: ["bug"]
body:
  - type: textarea
    id: summary
    attributes:
      label: What happened?
      description: Describe the problem clearly.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Open the app
        2. Click ...
        3. See ...
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: App version
      placeholder: 0.1.0
  - type: textarea
    id: extra
    attributes:
      label: Extra details
      description: Logs, screenshots, or any useful context.
